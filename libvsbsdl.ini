[project]
name: "libvsbsdl"
status: "experimental"
year_of_creation: "2023"
data_format: "BSD disklabel volume system"
documentation_url: "https://github.com/libyal/libvsbsdl/tree/main/documentation"
features: ["debug_output", "ossfuzz", "python_bindings", "tools"]

[library]
features: ["pthread", "wide_character_type"]
public_types: ["partition", "volume"]
tests: ["disklabel", "error", "io_handle", "notify", "partition_entry", "sector_data"]
tests_with_input: ["partition", "support", "volume"]

[python_module]
tests: ["support"]
tests_with_input: ["partition", "volume"]

[tools]
description: "Several tools for Several tools for reading BSD disklabel volume systems"
names: ["vsbsdlinfo"]
tests: ["info_handle", "output", "signal"]

[info_tool]
features: ["offset"]
source_description: "a BSD disklabel volume system"
source_type: "image"

[troubleshooting]
example: "vsbsdlinfo image.raw"

[test_data]
repository: "log2timeline/dfvfs"
files: ["ufs2.raw"]

[tests]
profiles: ["libvsbsdl", "pyvsbsdl", "vsbsdlinfo"]
options_per_profile: ["", "", ""]
info_tool_profiles: ["vsbsdlinfo"]
example_filename1: "image1.raw"
example_filename2: "image2.raw"

